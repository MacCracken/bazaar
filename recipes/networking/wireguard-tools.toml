# wireguard-tools — WireGuard VPN userspace tools (wg, wg-quick)

[package]
name = "wireguard-tools"
version = "1.0.20210914"
description = "WireGuard VPN userspace tools"
license = "GPL-2.0"
groups = ["networking", "vpn"]

[source]
url = "https://git.zx2c4.com/wireguard-tools/snapshot/wireguard-tools-1.0.20210914.tar.xz"
sha256 = ""

[depends]
runtime = ["glibc"]
build = ["gcc", "make"]

[build]
configure = ""
make = "make -C src -j$(nproc)"
check = ""
install = "make -C src DESTDIR=$PKG PREFIX=/usr install"
