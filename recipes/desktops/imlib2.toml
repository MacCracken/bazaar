# Imlib2 — Image loading and rendering library
# Required by feh. Fast image manipulation with caching.
#
# BLFS

[package]
name = "imlib2"
version = "1.12.5"
description = "Imlib2 — fast image loading and rendering library"
license = "MIT"
groups = ["desktop", "image"]
release = 1
arch = "x86_64"

[source]
url = "https://downloads.sourceforge.net/enlightenment/imlib2-1.12.5.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "freetype", "libpng", "libjpeg-turbo", "libtiff", "giflib", "libwebp", "libxext"]
build = ["gcc", "make", "pkgconf"]
optional = ["libheif", "libjxl"]

[build]
pre_build = ""
configure = """
./configure --prefix=/usr \
    --enable-shared \
    --disable-static
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
