# Evince — GNOME document viewer
# Supports PDF, PostScript, DjVu, TIFF, XPS.
# Heavier than Zathura but richer feature set (annotations, forms).
#
# BLFS

[package]
name = "evince"
version = "46.3"
description = "Evince — GNOME document viewer (PDF, PS, DjVu)"
license = "GPL-2.0-or-later"
groups = ["desktop", "document"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/evince/46/evince-46.3.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "gtk4", "glib", "cairo", "pango", "poppler", "libxml2", "dbus", "adwaita-icon-theme", "libhandy"]
build = ["meson", "ninja", "pkgconf", "gobject-introspection", "itstool", "gettext"]
optional = ["djvulibre", "libspectre", "libtiff", "nautilus"]

[build]
pre_build = ""
configure = """
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -Dnautilus=false \
    -Dgtk_doc=false \
    -Dintrospection=true \
    -Dps=disabled \
    -Ddjvu=disabled
"""
make = "ninja -C build -j$(nproc)"
check = "ninja -C build test || true"
install = "DESTDIR=$PKG ninja -C build install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
