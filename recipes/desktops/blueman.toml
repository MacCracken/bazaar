# Blueman — GTK Bluetooth manager
# GUI for pairing, connecting, and managing Bluetooth devices.
# Frontend for BlueZ daemon.
#
# BLFS

[package]
name = "blueman"
version = "2.4.3"
description = "Blueman — GTK Bluetooth manager"
license = "GPL-3.0-or-later"
groups = ["desktop", "bluetooth", "hardware"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/blueman-project/blueman/releases/download/2.4.3/blueman-2.4.3.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "gtk3", "glib", "bluez", "python3", "dbus", "polkit", "libnotify", "pango", "cairo"]
build = ["gcc", "make", "pkgconf", "python3", "cython", "gobject-introspection", "gettext", "autoconf", "automake", "libtool"]
optional = ["pulseaudio", "pipewire", "networkmanager"]

[build]
pre_build = ""
configure = """
./configure --prefix=/usr \
    --sysconfdir=/etc \
    --with-dhcp-config=/etc/dhcpcd.conf \
    --disable-schemas-compile
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = """
# Polkit rule for Bluetooth management
mkdir -p $PKG/usr/share/polkit-1/rules.d
cat > $PKG/usr/share/polkit-1/rules.d/51-blueman.rules << 'POLKIT'
polkit.addRule(function(action, subject) {
    if ((action.id == "org.blueman.network.setup" ||
         action.id == "org.blueman.dhcp.client" ||
         action.id == "org.blueman.rfkill.setstate" ||
         action.id == "org.blueman.pppd.pppconnect") &&
        subject.isInGroup("wheel")) {
        return polkit.Result.YES;
    }
});
POLKIT
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
