# GParted — GNOME Partition Editor
# GUI for creating, resizing, moving, and managing disk partitions.
# Wraps parted/libparted with GTK interface.
#
# BLFS

[package]
name = "gparted"
version = "1.7.0"
description = "GParted — GNOME partition editor"
license = "GPL-2.0-or-later"
groups = ["desktop", "disk", "system"]
release = 1
arch = "x86_64"

[source]
url = "https://downloads.sourceforge.net/gparted/gparted-1.7.0.tar.gz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "gtkmm3", "parted", "e2fsprogs", "util-linux", "polkit"]
build = ["gcc", "make", "pkgconf", "intltool", "itstool", "gnome-doc-utils"]
optional = ["btrfs-progs", "dosfstools", "exfatprogs", "f2fs-tools", "ntfs-3g", "xfsprogs"]

[build]
pre_build = ""
configure = """
./configure --prefix=/usr \
    --sbindir=/usr/sbin \
    --disable-doc \
    --enable-online-resize
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = """
# Polkit rule for GUI partition editing
mkdir -p $PKG/usr/share/polkit-1/actions
cat > $PKG/usr/share/polkit-1/actions/org.gnome.gparted.policy << 'POLKIT'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE policyconfig PUBLIC
 "-//freedesktop//DTD PolicyKit Policy Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/PolicyKit/1/policyconfig.dtd">
<policyconfig>
  <action id="org.gnome.gparted">
    <description>Run GParted</description>
    <message>Authentication is required to run the partition editor</message>
    <defaults>
      <allow_any>auth_admin</allow_any>
      <allow_inactive>auth_admin</allow_inactive>
      <allow_active>auth_admin_keep</allow_active>
    </defaults>
    <annotate key="org.freedesktop.policykit.exec.path">/usr/sbin/gparted</annotate>
    <annotate key="org.freedesktop.policykit.exec.allow_gui">true</annotate>
  </action>
</policyconfig>
POLKIT
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
