# network-manager-applet — NetworkManager GUI frontend
# System tray applet and connection editor for WiFi, VPN, Ethernet.
# Frontend for the NetworkManager daemon.
#
# BLFS

[package]
name = "network-manager-applet"
version = "1.36.0"
description = "NetworkManager applet — GUI for WiFi/VPN/network management"
license = "GPL-2.0-or-later"
groups = ["desktop", "network"]
release = 1
arch = "x86_64"

[source]
url = "https://download.gnome.org/sources/network-manager-applet/1.36/network-manager-applet-1.36.0.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "gtk3", "glib", "networkmanager", "libnma", "libsecret", "libnotify", "dbus", "polkit", "iso-codes"]
build = ["meson", "ninja", "pkgconf", "gobject-introspection", "gettext"]
optional = ["modemmanager", "libappindicator"]

[build]
pre_build = ""
configure = """
meson setup build \
    --prefix=/usr \
    --buildtype=release \
    -Dappindicator=no \
    -Dselinux=false \
    -Dteam=false \
    -Dwwan=false
"""
make = "ninja -C build -j$(nproc)"
check = "ninja -C build test || true"
install = "DESTDIR=$PKG ninja -C build install"
post_install = """
# Autostart for desktop session
mkdir -p $PKG/etc/xdg/autostart
cat > $PKG/etc/xdg/autostart/nm-applet.desktop << 'EOF'
[Desktop Entry]
Name=Network Manager Applet
Comment=Manage your network connections
Exec=nm-applet --indicator
Icon=network-wireless
Type=Application
Categories=System;Network;
OnlyShowIn=GNOME;XFCE;
AutostartCondition=GSettings org.gnome.nm-applet show-applet
EOF
"""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
