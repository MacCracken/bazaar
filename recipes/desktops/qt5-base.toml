# Qt 5 Base — Cross-platform application framework
# Core module providing widgets, networking, SQL, XML, etc.
# Required by KeePassXC.
#
# BLFS

[package]
name = "qt5-base"
version = "5.15.16"
description = "Qt 5 Base — cross-platform application framework (core module)"
license = "LGPL-3.0-or-later"
groups = ["desktop", "gui", "framework"]
release = 1
arch = "x86_64"

[source]
url = "https://download.qt.io/archive/qt/5.15/5.15.16/submodules/qtbase-everywhere-opensource-src-5.15.16.tar.xz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "glib", "dbus", "fontconfig", "freetype", "harfbuzz", "icu", "openssl", "zlib", "libpng", "libjpeg-turbo", "sqlite", "pcre2", "libxkbcommon", "wayland", "mesa", "vulkan-loader", "libinput"]
build = ["gcc", "make", "pkgconf", "perl", "python3"]
optional = ["cups", "mariadb", "postgresql", "unixodbc"]

[build]
pre_build = ""
configure = """
./configure -prefix /usr \
    -sysconfdir /etc/xdg \
    -opensource -confirm-license \
    -release \
    -shared \
    -system-harfbuzz \
    -system-sqlite \
    -openssl-linked \
    -dbus-linked \
    -no-rpath \
    -no-strip \
    -nomake examples \
    -nomake tests
"""
make = "make -j$(nproc)"
check = ""
install = "make INSTALL_ROOT=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
