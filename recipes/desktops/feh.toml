# feh — Fast, lightweight image viewer
# X11/Xwayland image viewer with slideshow, montage, and wallpaper modes.
# Complement to IMV (Wayland-native) for X11 compatibility.

[package]
name = "feh"
version = "3.10.3"
description = "feh — fast, lightweight X11 image viewer"
license = "MIT"
groups = ["desktop", "image"]
release = 1
arch = "x86_64"

[source]
url = "https://feh.finalrewind.org/feh-3.10.3.tar.bz2"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "imlib2", "libcurl", "libpng", "libjpeg-turbo", "libxinerama", "libxt"]
build = ["gcc", "make", "pkgconf"]
optional = ["libexif", "libtiff"]

[build]
pre_build = ""
configure = ""
make = "make PREFIX=/usr exif=1 help=1 -j$(nproc)"
check = "make test || true"
install = "make PREFIX=/usr DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
