# Xarchiver — Lightweight GTK archive manager
# Lighter alternative to File Roller, no GNOME dependencies.
# Supports tar, zip, 7z, rar, arj, lha, and more via external tools.
#
# BLFS

[package]
name = "xarchiver"
version = "0.5.4.23"
description = "Xarchiver — lightweight GTK archive manager"
license = "GPL-2.0-or-later"
groups = ["desktop", "utility"]
release = 1
arch = "x86_64"

[source]
url = "https://github.com/ib/xarchiver/archive/refs/tags/0.5.4.23.tar.gz"
sha256 = ""
patches = []

[depends]
runtime = ["glibc", "gtk3", "glib", "cairo", "pango"]
build = ["gcc", "make", "pkgconf", "intltool", "autoconf", "automake", "libtool"]
optional = ["thunar", "p7zip", "unrar", "cpio"]

[build]
pre_build = "./autogen.sh"
configure = """
./configure --prefix=/usr \
    --disable-debug
"""
make = "make -j$(nproc)"
check = "make check || true"
install = "make DESTDIR=$PKG install"
post_install = ""

[security]
hardening = ["pie", "fullrelro", "fortify", "stackprotector", "bindnow"]
cflags = "-O2 -pipe"
ldflags = "-Wl,--as-needed"
