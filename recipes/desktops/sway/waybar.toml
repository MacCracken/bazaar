# waybar — highly customizable Wayland bar for sway and other compositors
# swaybar ships with sway itself; waybar is the popular standalone replacement.

[package]
name = "waybar"
version = "0.11.0"
description = "Waybar — highly customizable Wayland bar for sway and other compositors"
license = "MIT"
groups = ["desktops", "wayland"]

[source]
url = "https://github.com/Alexays/Waybar/archive/refs/tags/0.11.0.tar.gz"
sha256 = ""

[depends]
runtime = [
    "glibc",
    "wayland",
    "gtk4",
    "gtk-layer-shell",
    "json-c",
    "pulseaudio",
    "libinput",
    "libevdev",
    "spdlog",
    "fmt",
]
build = ["meson", "ninja", "wayland-dev", "scdoc"]

[build]
configure = "meson setup build --prefix=/usr -Dbuildtype=release"
make = "ninja -C build"
check = ""
install = "DESTDIR=$PKG ninja -C build install"
