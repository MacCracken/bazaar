# aider — AI pair programming in the terminal
# Routes through hoosh for LLM access, or direct to cloud providers.

[package]
name = "aider"
version = "0.83.2"
description = "aider — AI pair programming in your terminal"
license = "Apache-2.0"
groups = ["ai", "development"]

[source]
url = "https://github.com/paul-gauthier/aider/archive/refs/tags/v0.83.2.tar.gz"
sha256 = ""

[depends]
runtime = ["python3", "git"]
build = ["python3", "pip"]

[build]
configure = ""
make = "pip wheel --no-deps ."
check = ""
install = "pip install --root=$PKG --prefix=/usr dist/*.whl"
