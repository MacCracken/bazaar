# pass — the standard unix password manager (GPG-based)

[package]
name = "pass"
version = "1.7.4"
description = "pass — the standard Unix password manager (GPG + git)"
license = "GPL-2.0"
groups = ["security"]

[source]
url = "https://git.zx2c4.com/password-store/snapshot/password-store-1.7.4.tar.xz"
sha256 = ""

[depends]
runtime = ["bash", "gnupg", "git", "tree"]
build = ["make"]

[build]
configure = ""
make = ""
check = ""
install = "make DESTDIR=$PKG PREFIX=/usr install"
