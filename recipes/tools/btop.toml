# btop — resource monitor (CPU, memory, disk, network, processes)

[package]
name = "btop"
version = "1.4.3"
description = "btop — resource monitor with a TUI dashboard"
license = "Apache-2.0"
groups = ["tools", "monitoring"]

[source]
url = "https://github.com/aristocratos/btop/archive/refs/tags/v1.4.3.tar.gz"
sha256 = ""

[depends]
runtime = ["glibc"]
build = ["gcc", "make"]

[build]
configure = ""
make = "make -j$(nproc) OPTFLAGS='-O2'"
check = ""
install = "make DESTDIR=$PKG PREFIX=/usr install"
