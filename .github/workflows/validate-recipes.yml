name: Validate Recipes

on:
  pull_request:
    paths:
      - 'recipes/**/*.cyml'
      - 'scripts/validate_recipes.cyr'
      - 'tests/**'
      - 'benches/**'
      - 'cyrius.cyml'
      - '.github/workflows/validate-recipes.yml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CYRIUS_VERSION: "5.2.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sSfL https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | sh
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: cc5 --version

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build validator
        run: |
          mkdir -p build
          cyrius build scripts/validate_recipes.cyr build/bazaar-validate

      - name: Validate recipes
        run: ./build/bazaar-validate

      - name: Run validator tests
        run: |
          if [ -f tests/run.sh ]; then
            sh tests/run.sh
          elif ls tests/tcyr/*.tcyr >/dev/null 2>&1; then
            for t in tests/tcyr/*.tcyr; do
              name=$(basename "$t" .tcyr)
              echo "=== $name ==="
              cyrius build "$t" "/tmp/ci_$name"
              "/tmp/ci_$name"
              rm -f "/tmp/ci_$name"
            done
          else
            echo "No tests found, skipping"
          fi

      - name: Benchmark validator (regression check)
        run: |
          if [ -f benches/run.sh ]; then
            sh benches/run.sh --check
          else
            echo "No benchmarks found, skipping"
          fi

      - name: Check GPG signatures (advisory)
        if: github.event_name == 'pull_request'
        run: |
          for sha in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
            if ! git verify-commit "$sha" 2>/dev/null; then
              echo "::warning::Commit $sha is not GPG-signed"
            fi
          done
