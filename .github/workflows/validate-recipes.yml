name: Validate Recipes

on:
  pull_request:
    paths:
      - 'recipes/**/*.toml'
      - 'scripts/validate_recipes.py'
      - '.github/workflows/validate-recipes.yml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate recipes
        run: python3 scripts/validate_recipes.py

      - name: Check GPG signatures (advisory)
        if: github.event_name == 'pull_request'
        run: |
          for sha in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
            if ! git verify-commit "$sha" 2>/dev/null; then
              echo "::warning::Commit $sha is not GPG-signed"
            fi
          done
