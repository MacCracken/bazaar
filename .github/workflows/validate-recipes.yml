name: Validate Recipes

on:
  pull_request:
    paths:
      - 'recipes/**/*.cyml'
      - 'scripts/validate_recipes.cyr'
      - 'tests/**'
      - 'benches/**'
      - 'cyrius.cyml'
      - 'cyrius.lock'
      - 'VERSION'
      - 'CHANGELOG.md'
      - '.github/workflows/validate-recipes.yml'
  push:
    branches: [main]
  # Allows release.yml to gate on this workflow via `jobs.ci.uses: ...`.
  workflow_call:

# Least-privilege token. See docs/audit/2026-04-16.md F2.
permissions:
  contents: read

# Cancel superseded runs on the same ref so CI doesn't backlog a noisy PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHA to defend against tag retargeting
      # (see docs/audit/2026-04-16.md F1 — CVE-2025-30066 tj-actions incident).
      # Bump the SHA AND the comment together when updating actions/checkout.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Cyrius toolchain
        # Read the pinned version from cyrius.cyml so the manifest is the
        # single source of truth (matches nous/daimon CI). Tarball install
        # closes docs/audit/2026-04-16.md F9 — no piping a fetched
        # install.sh into sh. The CYRIUS_VERSION env override lets a workflow
        # re-run test a different toolchain without editing the manifest.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV
          rm -f "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # cyrius.lock pins the zugot dist-module hash. --verify fails if the
        # resolved module's hash differs from the lock — catches upstream
        # tampering or an out-of-date lockfile after a zugot tag bump.
        # Skipped on the first push that introduces a new dep before
        # cyrius.lock is generated and committed (matches daimon's pattern).
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Lint validator
        run: |
          out=$(cyrius lint scripts/validate_recipes.cyr 2>&1)
          echo "$out"
          if echo "$out" | grep -qE '^\s*warn '; then
            echo "lint: warnings present"
            exit 1
          fi

      - name: Vet
        run: cyrius vet scripts/validate_recipes.cyr

      - name: Build validator
        run: |
          mkdir -p build
          cyrius build scripts/validate_recipes.cyr build/bazaar-validate
          echo "bazaar-validate: $(wc -c < build/bazaar-validate) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/bazaar-validate | grep -q "7f45 4c46"

      - name: Validate recipes
        run: ./build/bazaar-validate

      - name: Run validator tests
        run: sh tests/run.sh

      - name: Benchmark validator (regression check)
        run: sh benches/run.sh --check

      # GitHub context values are passed through env, not interpolated directly
      # into the shell script. See docs/audit/2026-04-16.md F8.
      - name: Check GPG signatures (advisory)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          for sha in $(git log --format=%H "origin/${BASE_REF}..HEAD"); do
            if ! git verify-commit "$sha" 2>/dev/null; then
              echo "::warning::Commit $sha is not GPG-signed"
            fi
          done

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Check required files
        # Required for a tag-cuttable release. cyrius.lock is required so
        # validate-recipes.yml's --verify step is load-bearing on every PR
        # (prevents a silent regression where a missing lockfile causes
        # the verify to be skipped indefinitely).
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION LICENSE \
                   MAINTAINERS.yaml cyrius.cyml cyrius.lock \
                   docs/contributing.md docs/recipe-format.md docs/validator.md; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        # cyrius.cyml pulls package.version from VERSION via ${file:VERSION};
        # this checks that the same version appears in CHANGELOG so release
        # notes can be extracted automatically.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "^## \[$VERSION\]" CHANGELOG.md || {
            echo "FAIL: no '## [$VERSION]' section in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
